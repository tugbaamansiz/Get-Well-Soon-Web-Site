<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Geçmiş Olsun</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="kalpler">
        <div class="card">
            <br>
            <img src="edc1fe67fdec3bf5241f5fc0b68ca009.gif" alt="Geçmiş olsun gif" class="gif">
            <br>

        <h1>Geçmiş Olsun Cimcime</h1>
        <br>
        <br>
        <br>
        <p>Umarım en kısa zamanda iyileşirsin</p>
        <br>
        <br>
        <br>
       <button id="btn1" onclick="goster('btn2','btn1')">Bana Tıkla!</button>
       <button id="btn2" onclick="goster('btn3','btn2')" style="display:none;">İyi ol lütfen 💗</button>
       <button id="btn3" onclick="goster('btn4','btn3')" style="display:none;">Dobarlan kendine gel 💖</button>
       <button id="btn4" onclick="goster('btn5','btn4')" style="display:none;">İyi ki varsın cimcime 💕</button>
       <button id="btn5" onclick="goster('btn6','btn5')" style="display:none;">Sen çok güçlü bir kızsın 💗</button>
       <button id="btn6" onclick="goster('btn7','btn6')" style="display:none;">Seni çok seviyoruz 🤍</button>
       <button id="btn7" onclick="goster('btn8','btn7')" style="display:none;">Bu site sadece senin için yapıldı 💌</button>
       <button id="btn8" onclick="goster('btn9','btn8')" style="display:none;">Umarım biraz olsun moral olmuştur 💞</button>
       <button id="btn9" onclick="surpriz('mesaj','btn9')" style="display:none;">Bir sürpriz daha var!</button>
       <p id="mesaj" style="display:none;">Geçmiş olsun ❤️ Umarım çok yakında tamamen iyileşirsin...</p>
       
       <script>
         function goster(yeni, eski){
            document.getElementById(yeni).style.display="block";
            document.getElementById(eski).style.display="none";}

            function kalpOlustur(){
                const kalp = document.createElement("div");
                kalp.innerHTML="💗";
                kalp.style.position="fixed";
                kalp.style.left=Math.random()*100+"vw";
                kalp.style.top="100vh";
                kalp.style.fontSize="25px";
                kalp.style.animation="yukari 3s linear";
                document.body.appendChild(kalp);
                ssetTimeout(()=>{
                    kalp.remove();},3000);}

            function kalpleriBaslat(){
                setInterval(kalpOlustur,300);}    
                
                function surpriz(yeni,eski){
                    document.getElementById(yeni).style.display="block";
                    document.getElementById(eski).style.display="none";
                    kalpleriBaslat();}
        </script>

        </div>
        </div>
        
    </body>
</html>
